<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CSS + DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
        font-optical-sizing: auto;
      }
    </style>

    <title>Job Application Tracker</title>
  </head>
  <body>
    <main class="bg-base-200 min-h-screen">
      <div class="container mx-auto py-10 px-4">
        <h1 class="text-3xl sm:text-4xl font-bold mb-6">
          Job Application Tracker
        </h1>

        <div class="flex justify-between flex-wrap gap-4 sm:gap-8">
          <div class="grow p-4 sm:p-6 rounded-md bg-base-100 shadow-sm">
            <h6 class="text-lg">Total</h6>
            <h4 class="text-3xl font-bold">8</h4>
          </div>
          <div class="grow p-4 sm:p-6 rounded-md bg-base-100 shadow-sm">
            <h6 class="text-lg">Interview</h6>
            <h4 class="text-3xl font-bold text-green-500">0</h4>
          </div>
          <div class="grow p-4 sm:p-6 rounded-md bg-base-100 shadow-sm">
            <h6 class="text-lg">Rejected</h6>
            <h4 class="text-3xl font-bold text-red-500">0</h4>
          </div>
        </div>

        <div class="divider"></div>

        <div>
          <div class="flex justify-between items-center mb-4">
            <h4 class="text-xl font-semibold">Available Jobs</h4>
            <p class="font-medium opacity-40">8 Jobs</p>
          </div>

          <div class="space-x-1">
            <button class="btn btn-primary">All</button>
            <button class="btn bg-base-100">Interview</button>
            <button class="btn bg-base-100">Rejected</button>
          </div>

          <div id="jobs-container" class="mt-6 space-y-4"></div>

          <div
            class="bg-base-100 rounded-md text-center px-4 py-4 sm:py-20 shadow-sm flex flex-col justify-center items-center mt-6"
          >
            <img src="./assets/jobs.png" alt="" />
            <h4 class="text-2xl font-semibold mb-1 mt-2">No jobs available</h4>
            <p class="opacity-70">Check back soon for new job opportunities</p>
          </div>
        </div>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
